model_list:
  - model_name: gpt-5
    litellm_params:
      model: openai/openai/gpt-5.4
      api_base: https://openai.dalong.io/v1  # 👈 自定义地址
      api_key: os.environ/OPENAI_API_KEY
  - model_name: deepseek-reasoner
    litellm_params:
      model: openai/deepseek/deepseek-reasoner #deepseek/deepseek/deepseek-reasoner
      api_base: https://aiproxy.dalong.io/v1  # 👈 自定义地址
      api_key: os.environ/AIGATEWAY_API_KEY

# 重要：必须设置此参数，以便将客户端的认证头发送给上游的 Anthropic API
# 这对于使用 Claude Max 订阅等场景至关重要 [citation:2]
general_settings:
  forward_client_headers_to_llm_api: true

# 可选：设置代理自己的 master key 用于客户端认证
litellm_settings:
  drop_params: true                      # 自动删除模型不支持的参数 [citation:10]
